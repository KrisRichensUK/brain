version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: access
      POSTGRES_PASSWORD: access
      POSTGRES_DB: proof_access
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"
